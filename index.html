<script>
        let currentUser = null;
        let registeredUsers = JSON.parse(localStorage.getItem('nairafund_users')) || [];
        let miningActive = false;
        let miningInterval = null;

        function showRegister() {
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('register-page').classList.remove('hidden');
        }

        function showLogin() {
            document.getElementById('register-page').classList.add('hidden');
            document.getElementById('login-page').classList.remove('hidden');
        }

        function registerUser() {
            const name = document.getElementById('reg-name').value.trim();
            const phone = document.getElementById('reg-phone').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value.trim();

            if (!name || !phone || !email || !password) {
                alert("All fields are required!");
                return;
            }
            if (password.length < 6) {
                alert("Password must be at least 6 characters");
                return;
            }

            if (registeredUsers.some(u => u.phone === phone)) {
                alert("This phone number is already registered");
                return;
            }

            registeredUsers.push({ name, phone, email, password });
            localStorage.setItem('nairafund_users', JSON.stringify(registeredUsers));

            alert("Registration successful! Please login.");
            showLogin();
        }

        function loginUser() {
            const identifier = document.getElementById('login-identifier').value.trim();
            const password = document.getElementById('login-password').value.trim();

            if (!identifier || !password) {
                alert("Please enter phone/email and password");
                return;
            }

            const user = registeredUsers.find(u => 
                (u.phone === identifier || u.email === identifier) && u.password === password
            );

            if (!user) {
                alert("Invalid credentials");
                return;
            }

            currentUser = user;
            document.getElementById('user-avatar').textContent = user.name.charAt(0).toUpperCase();
            
            // Sync user data to the withdrawal page fields automatically
            document.getElementById('withdraw-name').value = user.name;
            document.getElementById('withdraw-phone').value = user.phone;

            const hasLoggedBefore = localStorage.getItem(`logged_${user.phone}`);
            
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');

            if (!hasLoggedBefore) {
                showVerificationCode(user.phone);
                localStorage.setItem(`logged_${user.phone}`, 'true');
            }
        }

        function showVerificationCode(phone) {
            const last4 = phone.slice(-4) || "1234";
            document.getElementById('verify-code').textContent = last4;
            document.getElementById('verify-modal').classList.remove('hidden');
        }

        function copyVerifyCode() {
            const code = document.getElementById('verify-code').textContent;
            navigator.clipboard.writeText(code);
            alert("Verification code copied: " + code);
        }

        function closeVerifyModal() {
            document.getElementById('verify-modal').classList.add('hidden');
        }

        function switchTab(n) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.add('hidden'));
            const tabId = ['home', 'referral', 'withdraw'][n-1];
            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
            
            document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
            document.getElementById(`tab${n}`).classList.add('active');
        }

        function startMining() {
            if (miningActive) return;
            miningActive = true;
            
            const btn = document.getElementById('start-btn');
            btn.textContent = "MINING ACTIVE";
            btn.disabled = true;
            btn.classList.replace('bg-emerald-500', 'bg-zinc-800');
            btn.classList.add('text-zinc-500', 'cursor-not-allowed');
            
            document.getElementById('balance').textContent = "₦85,000.00";

            let earnings = 0;
            const liveEl = document.getElementById('live-earnings');
            
            if (miningInterval) clearInterval(miningInterval);
            
            miningInterval = setInterval(() => {
                earnings += 0.85;
                liveEl.textContent = earnings.toFixed(2);
            }, 100);
        }

        // Withdrawal Code Logic Hooks
        function openWithdrawalModal() {
            document.getElementById('withdrawal-modal').classList.remove('hidden');
        }

        function closeWithdrawalModal() {
            document.getElementById('withdrawal-modal').classList.add('hidden');
        }

        function submitWithdrawalCode() {
            const code = document.getElementById('withdrawal-code').value.trim();
            if (code.length < 8) {
                alert("Please enter a valid 8-digit code.");
                return;
            }
            alert("Checking code stability... Processing transaction request.");
            closeWithdrawalModal();
        }

        // FAST LOAD: Instantly dismiss loading screen when DOM is ready
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('login-page').classList.remove('hidden');
        });
    q// Lifecycle loader window handler - Loads instantly!

    document.getElementById('login-page').classList.remove('hidden');

    </script>
