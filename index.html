<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nairafund - Clean Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .nav-tab.active { color: #10b981; border-bottom: 3px solid #10b981; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">

    <!-- HEADER -->
    <header class="bg-zinc-900 border-b border-zinc-800 py-5 px-6 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <h1 class="text-3xl font-semibold text-emerald-400">Nairafund</h1>
            
            <div class="flex items-center gap-8 text-lg">
                <button onclick="switchTab(1)" id="tab1" class="nav-tab active px-4 py-2">Home</button>
                <button onclick="switchTab(2)" id="tab2" class="nav-tab px-4 py-2">Referral</button>
                <button onclick="switchTab(3)" id="tab3" class="nav-tab px-4 py-2">Withdraw</button>
            </div>

            <div class="flex items-center gap-4">
                <i class="fa-solid fa-bell text-2xl text-zinc-400"></i>
                <div class="w-9 h-9 bg-emerald-500 rounded-full flex items-center justify-center text-sm font-bold">VF</div>
            </div>
        </div>
    </header>

    <div class="max-w-5xl mx-auto px-6 py-10">

        <!-- HOME TAB -->
        <div id="tab-home">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <!-- Balance -->
                <div class="lg:col-span-4">
                    <div class="bg-zinc-900 rounded-3xl p-8">
                        <p class="text-zinc-400">Available Balance</p>
                        <p id="balance" class="text-6xl font-semibold text-white mt-3">₦0.00</p>
                    </div>
                </div>

                <!-- Mining -->
                <div class="lg:col-span-8 bg-zinc-900 rounded-3xl p-10">
                    <div class="flex flex-col items-center">
                        <div class="relative w-64 h-64">
                            <svg class="w-full h-full -rotate-12" viewBox="0 0 200 200">
                                <circle cx="100" cy="100" r="85" fill="none" stroke="#27272a" stroke-width="22"/>
                                <circle cx="100" cy="100" r="85" fill="none" stroke="#10b981" stroke-width="22" stroke-dasharray="534" stroke-dashoffset="90" stroke-linecap="round"/>
                            </svg>
                            <div class="absolute inset-0 flex flex-col items-center justify-center">
                                <div class="bg-yellow-400 text-black w-16 h-16 rounded-2xl flex items-center justify-center mb-4">
                                    <i class="fa-solid fa-dollar-sign text-4xl"></i>
                                </div>
                                <div class="text-5xl font-semibold">85,000</div>
                                <p class="text-zinc-400 text-lg">Naira / Day</p>
                            </div>
                        </div>

                        <button onclick="startMining()" id="start-btn"
                            class="mt-8 w-full max-w-md bg-emerald-500 hover:bg-emerald-600 py-6 rounded-3xl text-xl font-semibold">
                            START MINING
                        </button>

                        <div class="mt-12 w-full max-w-md text-center">
                            <p class="text-zinc-400 mb-1">Live Earnings</p>
                            <div id="live-earnings" class="text-5xl font-semibold text-yellow-300">0.00</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Image Generation Prompt Used -->
    <div class="max-w-5xl mx-auto px-6 py-6 text-center text-zinc-500 text-sm">
        <p>The image below shows exactly how the current app looks:</p>
    </div>

    <!-- GENERATED APP PREVIEW IMAGE -->
    <div class="flex justify-center">

    </div>

    <script>
        function switchTab(n) {
            alert("Tab " + n + " clicked (Demo)");
        }
        function startMining() {
            document.getElementById('balance').textContent = "₦85,000";
            document.getElementById('start-btn').innerHTML = "MINING ACTIVE";
            let earnings = 0;
            const interval = setInterval(() => {
                earnings += 85;
                document.getElementById('live-earnings').textContent = earnings.toFixed(2);
            }, 600);
        }
    </script>
</body>
    </html>
